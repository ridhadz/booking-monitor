name: مراقبة مواعيد الحجز - Patchright

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - uses: actions/checkout@v4
    
    - name: تثبيت Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: تثبيت Patchright والمتصفح
      run: |
        pip install patchright
        # هذا الأمر هو ما شرحته سابقًا - يقوم بتثبيت متصفح مخصص معدل
        patchright install chromium
    
    - name: تثبيت المتطلبات الأخرى
      run: pip install -r requirements.txt
    
    - name: تشغيل السكربت
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python monitor.py
