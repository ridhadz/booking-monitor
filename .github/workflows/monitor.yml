name: مراقبة مواعيد الحجز - FlareSolverr

on:
  schedule:
    # تشغيل كل 30 دقيقة
    - cron: '*/30 * * * *'
  
  # تشغيل يدوي من واجهة GitHub
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: استنساخ الكود
      uses: actions/checkout@v4
    
    - name: تثبيت Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: تثبيت Docker
      run: |
        sudo apt-get update
        sudo apt-get install -y docker.io
        sudo systemctl start docker
        sudo systemctl enable docker
    
    - name: تشغيل FlareSolverr
      run: |
        sudo docker run -d --name flaresolverr -p 8191:8191 --restart=unless-stopped ghcr.io/flaresolverr/flaresolverr:latest
        echo "⏳ انتظار تشغيل FlareSolverr..."
        sleep 15
        echo "✅ FlareSolverr يعمل"
    
    - name: تثبيت المتطلبات
      run: pip install -r requirements.txt
    
    - name: تشغيل سكربت المراقبة
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python monitor.py
    
    - name: تنظيف - إيقاف FlareSolverr
      if: always()
      run: |
        sudo docker stop flaresolverr || true
        sudo docker rm flaresolverr || true
