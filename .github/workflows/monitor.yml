name: مراقبة مواعيد الحجز - FlareSolverr

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: استنساخ الكود
      uses: actions/checkout@v4
    
    - name: تثبيت Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: تشغيل FlareSolverr
      run: |
        docker run -d --name flaresolverr -p 8191:8191 ghcr.io/flaresolverr/flaresolverr:latest
        echo "⏳ انتظار تشغيل FlareSolverr..."
        sleep 15
        echo "✅ FlareSolverr يعمل"
        docker ps | grep flaresolverr
    
    - name: تثبيت المتطلبات
      run: pip install -r requirements.txt
    
    - name: تشغيل سكربت المراقبة
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python monitor.py
    
    - name: تنظيف - إيقاف FlareSolverr
      if: always()
      run: |
        docker stop flaresolverr || true
        docker rm flaresolverr || true
