name: مراقبة مواعيد الحجز - VPN

on:
  schedule:
    # تشغيل كل 30 دقيقة
    - cron: '*/30 * * * *'
  
  # تشغيل يدوي من واجهة GitHub
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # مهلة 15 دقيقة كحد أقصى
    
    steps:
    - name: استنساخ الكود
      uses: actions/checkout@v4
    
    - name: تثبيت Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: تثبيت متصفح Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser chromium-chromedriver
    
    - name: الاتصال بشبكة ZeroTier VPN
      uses: zerotier/github-action@v1
      with:
        network-id: ${{ secrets.ZEROTIER_NETWORK_ID }}
        auth-token: ${{ secrets.ZEROTIER_CENTRAL_TOKEN }}
    
    - name: انتظار اتصال VPN
      run: sleep 15
    
    - name: التحقق من عنوان IP بعد VPN
      run: curl ifconfig.me || echo "فشل التحقق من IP"
    
    - name: تثبيت المتطلبات
      run: pip install -r requirements.txt
    
    - name: تشغيل سكربت المراقبة
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python monitor.py
